on:
  push:
    branches:
      - 'main'

jobs:
  apic-deploy-test:
    runs-on: ubuntu-latest
    name: Validate API
    steps:
    - uses: actions/checkout@v2
    - uses: ibm-apiconnect/actions@a35e8f228a3559e0d9179004f742eb14c5d6cf47
      with:
        manager-host: api-manager.us-east-b.apiconnect.automation.ibm.com
        api-host: platform-api.us-east-b.apiconnect.automation.ibm.com
        provider-org: 'ricky'
        apikey: ${{ secrets.apikey }}
        api-spec: 'orders-api/order-status-api-spec.yaml'
