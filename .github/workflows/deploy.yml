on:
  workflow_run:
    workflows: ["Validate API"]
    branches: [main]
    types: 
      - completed

jobs:
  apic-deploy-test:
    runs-on: ubuntu-latest
    name: API Deployment
    steps:
    - uses: actions/checkout@v6
    - uses: ibm-apiconnect/actions@v12.1
      with:
        manager-host: api-manager.us-east-b.apiconnect.automation.ibm.com
        api-host: platform-api.us-east-b.apiconnect.automation.ibm.com
        provider-org: 'ricky'
        catalog: 'sandbox'
        apikey: ${{ secrets.apikey }}
        project: 'orders-api'
