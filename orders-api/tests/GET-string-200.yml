kind: assertion
apiVersion: api.ibm.com/v1
metadata:
  name: GET-string-200
  namespace: orders-api
  version: '1.0'
  tags: []
  description: ''
spec:
  - name: Validate the response status code
    key: code
    action: equals
    value: 200
  - name: Validate content type header
    key: responseHeaders.content-type
    action: equals
    value: application/json
  - name: Check order number
    key: responseBody
    value: order_number
    action: haveProperty
